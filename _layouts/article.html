<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <meta name="theme-color" content="#111827">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
    <link rel="shortcut icon" type="image/jpg" href="{{ '/resources/me.jpg' | relative_url }}" />
    <title>{{ page.title }} | Omar Brikaa</title>
</head>

<body class="article-page">
    <main class="article-shell">
        <a class="back-link" href="{{ '/' | relative_url }}">Omar Brikaa</a>

        <article class="article-body">
            <header class="article-header">
                <div class="article-meta">
                    {% if page.topic %}
                    <span>{{ page.topic }}</span>
                    {% endif %}
                    {% if page.date %}
                    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%b %-d, %Y" }}</time>
                    {% endif %}
                </div>
                <h1>{{ page.title }}</h1>
                {% if page.description %}
                <p>{{ page.description }}</p>
                {% endif %}
            </header>

            <div class="article-content">
                {{ content }}
            </div>
        </article>
    </main>
</body>

</html>
